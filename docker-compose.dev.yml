name: senvirox-dev

services:
  redis:
    image: redis:7.4-alpine
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory', '256mb', '--maxmemory-policy', 'allkeys-lru']
    volumes:
      - redis-dev-data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 5000
      DATA_DIR: /data
      USER_STORE: file
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-local-foundation-jwt-secret-32b-min-value}
    ports:
      - '5000:5000'
    volumes:
      - backend-dev-data:/data
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_APP_NAME: SENVIROX
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  redis-dev-data:
  backend-dev-data:
